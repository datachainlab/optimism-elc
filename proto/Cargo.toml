[package]
name = "optimism-ibc-proto"
version = "0.1.0"
edition = "2021"

[lib]
name = "optimism_ibc_proto"
path = "src/lib.rs"
doctest = false

[package.metadata.docs.rs]
all-features = true

[dependencies]
prost       = { workspace = true }
ibc-proto   = { version = "0.26.0", default-features = false }
ethereum-light-client-proto = { git = "https://github.com/datachainlab/ethereum-light-client-types", rev = "933be5eb28f9608d287b2f78cf3728883c5f7e56", default-features = false }

[features]
default     = ["std"]
std         = []
json-schema = []